services:
  # ============== PostgreSQL with pgvector ==============
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sponsor_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sponsor_net

  # ============== Redis ==============
  redis:
    image: redis:7-alpine
    container_name: sponsor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sponsor_net

  # ============== RabbitMQ ==============
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sponsor_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - sponsor_net

  # ============== FastAPI Backend ==============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sponsor_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - sponsor_net

  # ============== Celery Worker ==============
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sponsor_celery_worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q agent,email,default
    networks:
      - sponsor_net

  # ============== Celery Beat ==============
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sponsor_celery_beat
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    networks:
      - sponsor_net

  # ============== Flower (Celery Monitoring) ==============
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sponsor_flower
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: celery -A app.tasks.celery_app flower --port=5555
    networks:
      - sponsor_net

  # ============== React Frontend ==============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sponsor_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - sponsor_net

  # ============== Nginx Reverse Proxy ==============
  nginx:
    image: nginx:alpine
    container_name: sponsor_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sponsor_net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  sponsor_net:
    driver: bridge
